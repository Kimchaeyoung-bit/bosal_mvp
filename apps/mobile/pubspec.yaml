name: gangnam_bosal
description: "강남보살 - 나에게 맞는 보살 찾기"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.0
  flutter_dotenv: ^5.2.1
  supabase_flutter: ^2.8.0
  flutter_markdown: ^0.7.4+1
  collection: ^1.18.0
  sentry_flutter: ^8.10.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/legal/
    - .env

# ----------------------------------------------------------
# 앱 아이콘 (flutter_launcher_icons)
#   필요 자산: assets/launcher/icon-1024.png (1024x1024 PNG, 알파 채널 X)
#   적용:
#     cd apps/mobile && flutter pub get
#     dart run flutter_launcher_icons
# ----------------------------------------------------------
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/launcher/icon-1024.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/launcher/icon-1024.png"

# ----------------------------------------------------------
# 스플래시 (flutter_native_splash)
#   필요 자산: assets/launcher/splash.png
#   적용:
#     dart run flutter_native_splash:create
# ----------------------------------------------------------
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/launcher/splash.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/launcher/splash.png"
